# Local development stack: Postgres + Redis + the FastAPI api + a Celery
# worker. Chroma is NOT a service here, it runs embedded (just a folder on
# disk, see app/tools/vector_store.py) and that folder lives in the
# `chroma_data` volume shared by the api/worker containers below.
#
# First-time setup:
#   cp backend/.env.example backend/.env   # fill in your 3 API keys
#   docker compose up -d postgres redis
#   docker compose run --rm api alembic upgrade head
#   docker compose up -d
#
# Then: API on http://localhost:8000 (see /health), and `docker compose logs -f worker`
# to watch research runs happen in real time.
#
# SPEED NOTE: this file relies on BuildKit cache mounts defined in
# backend/Dockerfile. Make sure BuildKit is actually on:
#   export DOCKER_BUILDKIT=1
#   export COMPOSE_BAKE=true      # lets `docker compose build` use buildx bake,
#                                  # which parallelizes + shares cache between
#                                  # api and worker instead of building twice.
x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
    # api and worker share this exact image; with COMPOSE_BAKE=true (see note
    # above) compose builds it once via buildx bake instead of twice.
  env_file:
    - ./backend/.env
  environment:
    DATABASE_URL: postgresql+asyncpg://oracle:oracle@postgres:5432/oracle
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    CHECKPOINTER_BACKEND: postgres
    HF_HOME: /cache/huggingface
    TRANSFORMERS_CACHE: /cache/huggingface
    PYTHONUNBUFFERED: "1"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    - chroma_data:/app/data
    - huggingface_cache:/cache/huggingface
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oracle
      POSTGRES_PASSWORD: oracle
      POSTGRES_DB: oracle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle -d oracle"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    <<: *backend-common
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"

  worker:
    <<: *backend-common
    command:
      - uv
      - run
      - celery
      - -A
      - app.tasks.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  huggingface_cache:
