name: CI

# Runs on every push/PR, pure verification, no deployment. The two
# deploy-*.yml workflows are separate and only trigger on `main`, and each
# requires `ci` to succeed first (see their `workflow_run` trigger).
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/ eval/

      - name: Compile-check every module (catches syntax errors across the whole tree)
        run: python -m compileall -q app/ eval/

      - name: Run test suite
        env:
          # Dummy values so Settings() can construct itself during collection/
          # import of modules under test, no network calls happen in CI.
          OPENROUTER_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          CHECKPOINTER_BACKEND: "sqlite"
        run: pytest -q

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        # Uses `install` rather than `ci` because no package-lock.json is
        # committed to the repo (it's generated by your first local
        # `npm install`, see frontend/README or docs/RUNNING_FRONTEND.md).
        # Once you commit a lockfile, switch this to `npm ci` for faster,
        # fully-reproducible CI installs.
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        env:
          # A placeholder is fine here, this build only validates the
          # bundle compiles; the real value is injected at deploy time by
          # Vercel from its own project environment variables.
          NEXT_PUBLIC_API_BASE_URL: "https://placeholder.invalid"
        run: npm run build
